<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Anemone — Interest Rate Swaps on Solana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07080f;
    --surface:#0f1117;
    --surface-2:#0b0d14;
    --border:#1e1f2a;
    --border-strong:#2a2c3a;
    --text:#f5f5f7;
    --text-2:#8a8f9c;
    --text-3:#5b6070;

    --pink:#ec4899;
    --purple:#a855f7;
    --blue:#3b82f6;

    --grad:linear-gradient(135deg,#ec4899 0%,#a855f7 50%,#3b82f6 100%);
    --grad-h:linear-gradient(90deg,#ec4899 0%,#a855f7 50%,#3b82f6 100%);

    --red:#ef4444;
    --max:1280px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;
    font-feature-settings:'ss01','cv11';
  }
  body{overflow-x:hidden;position:relative}
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-feature-settings:'tnum'}
  .num{font-variant-numeric:tabular-nums}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 32px;position:relative;z-index:1}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);font-weight:500}
  .h1{font-size:clamp(52px,7vw,92px);line-height:.98;letter-spacing:-.03em;font-weight:300;color:var(--text);margin:0}
  .h2{font-size:clamp(40px,4.6vw,56px);line-height:1.04;letter-spacing:-.025em;font-weight:300;margin:0}
  .h3{font-size:24px;line-height:1.25;letter-spacing:-.01em;font-weight:400;margin:0}
  .sub{font-size:20px;line-height:1.5;color:var(--text-2);font-weight:400;margin:0}
  .muted{color:var(--text-2)}
  .muted-2{color:var(--text-3)}
  section{padding:120px 0;border-top:1px solid var(--border);position:relative}
  section:first-of-type{border-top:0}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}

  /* gradient text — RESERVED FOR LOGO GLYPH ONLY */
  .grad-text{
    color:var(--pink);
  }
  .pink-text{color:var(--pink)}
  .blue-text{color:var(--blue)}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:500;font-size:15px;
    transition:all .2s ease;position:relative;white-space:nowrap}
  .btn-primary{background:#ec4899;color:#0a0612;padding:0 22px;height:44px;border-radius:999px;font-weight:600}
  .btn-primary.lg{height:52px;padding:0 28px;font-size:16px}
  .btn-primary:hover{background:#db2777}
  .btn-primary::after{content:"";position:absolute;inset:-2px;border-radius:999px;background:#ec4899;
    filter:blur(18px);opacity:0;z-index:-1;transition:opacity .25s ease}
  .btn-primary:hover::after{opacity:.3}
  .btn-ghost{color:var(--text);padding:0 4px;height:44px;border-bottom:1px solid transparent}
  .btn-ghost:hover{border-bottom-color:var(--text-2)}

  /* placeholder */
  .ph{background:var(--surface-2);border:1px dashed var(--border-strong);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
      color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em;
      position:relative;overflow:hidden}
  .ph .glyph{font-size:18px;color:#3b4760;line-height:1}
  .ph .label{font-size:12px}

  /* Logo glyph — simple radial anemone mark (geometric, not illustrative) */
  .a-mark{width:24px;height:24px;position:relative;display:inline-block}
  .a-mark svg{width:100%;height:100%;display:block}

  /* Atmospheric glows (positioned absolutely on body) */
  .glow{position:absolute;pointer-events:none;border-radius:50%;filter:blur(120px);z-index:0}
  .glow-hero-1{width:1100px;height:900px;top:40px;right:-340px;filter:blur(140px);
    background:radial-gradient(ellipse at 40% 50%,rgba(236,72,153,.09),rgba(168,85,247,.07) 35%,rgba(59,130,246,.06) 60%,transparent 78%);opacity:.9}
  .glow-s1{width:720px;height:720px;left:-300px;top:1400px;
    background:radial-gradient(circle,rgba(168,85,247,.07),transparent 70%);}
  .glow-s2{width:700px;height:700px;right:-300px;top:3200px;
    background:radial-gradient(circle,rgba(59,130,246,.08),transparent 70%);}
  .glow-s3{width:800px;height:800px;left:-200px;top:5200px;
    background:radial-gradient(circle,rgba(236,72,153,.07),transparent 70%);}
  .glow-s4{width:900px;height:900px;right:-200px;top:7200px;
    background:radial-gradient(circle,rgba(168,85,247,.07),transparent 70%);}

  /* nav */
  nav.top{position:sticky;top:0;z-index:50;backdrop-filter:blur(20px) saturate(140%);
    -webkit-backdrop-filter:blur(20px) saturate(140%);
    background:rgba(7,8,15,.72);border-bottom:1px solid var(--border)}
  nav.top .wrap{display:flex;align-items:center;gap:28px;height:64px;z-index:2}
  .brand{display:flex;align-items:center;gap:10px;font-weight:500;font-size:16px;letter-spacing:-.01em}
  .navlinks{display:flex;gap:28px;margin-left:40px}
  .navlinks a{font-size:14px;color:var(--text-2)}
  .navlinks a:hover{color:var(--text)}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:18px}
  .badge{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--text-2);padding:5px 12px;border:1px solid var(--border);border-radius:4px;background:rgba(15,17,23,.6)}
  .dot-pink{width:7px;height:7px;background:var(--pink);border-radius:50%;
    box-shadow:0 0 10px 2px rgba(236,72,153,.65), 0 0 0 0 rgba(236,72,153,.55);
    animation:pulsePink 2s ease-out infinite}
  @keyframes pulsePink{
    0%{box-shadow:0 0 10px 2px rgba(236,72,153,.65), 0 0 0 0 rgba(236,72,153,.55)}
    70%{box-shadow:0 0 14px 3px rgba(236,72,153,.5), 0 0 0 10px rgba(236,72,153,0)}
    100%{box-shadow:0 0 10px 2px rgba(236,72,153,.65), 0 0 0 0 rgba(236,72,153,0)}
  }

  /* hero */
  .hero{padding-top:80px;padding-bottom:140px}
  .hero-grid{display:grid;grid-template-columns:55fr 45fr;gap:80px;align-items:center;min-height:calc(100vh - 64px - 240px);position:relative}
  .hero-left{position:relative;z-index:2}
  .hero-right{position:relative;z-index:1;margin-top:-40px}
  .card-anchor-line{position:absolute;top:0;bottom:-120px;width:1px;right:14%;
    background:linear-gradient(180deg,rgba(168,85,247,.28),rgba(168,85,247,0));opacity:.8;z-index:0;pointer-events:none}
  .hero-ctas{display:flex;align-items:center;gap:20px;margin-top:36px}
  .trust-bar{display:flex;align-items:center;gap:16px;margin-top:44px;flex-wrap:wrap;font-size:13px;color:var(--text-3)}
  .trust-bar .logo-slot{display:inline-flex;align-items:center;justify-content:center;
    padding:0 10px;height:22px;border:1px dashed var(--border-strong);background:var(--surface-2);
    color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:10px}

  /* hero dashboard */
  .hero-mock{position:relative;width:100%;aspect-ratio:560/420;max-width:580px;margin-left:auto}
  .hero-mock::before{content:"";position:absolute;inset:-80px;
    background:radial-gradient(ellipse at center,rgba(236,72,153,.22),rgba(168,85,247,.14) 35%,rgba(59,130,246,.10) 60%,transparent 80%);
    filter:blur(60px);z-index:0;pointer-events:none;opacity:.9}
  .hero-mock .frame{position:absolute;inset:0;border:1px dashed var(--border-strong);
    background:var(--surface-2);border-radius:6px;z-index:1}
  .hero-mock .frame-label{position:absolute;top:-22px;left:0;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);z-index:2}
  .dashcard{position:absolute;inset:24px;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:22px;transform:rotate(3deg);z-index:3;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.7);
  }
  .dashcard::before{content:"";position:absolute;inset:0;border-radius:10px;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.05),transparent 12%);mask:linear-gradient(180deg,#000,transparent 15%);-webkit-mask:linear-gradient(180deg,#000,transparent 15%)}
  .dashcard::after{content:"";position:absolute;inset:-1px;border-radius:10px;pointer-events:none;
    border:1px solid rgba(168,85,247,.18)}
  .dc-head{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-2);letter-spacing:.08em}
  .dc-head .live{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--pink);letter-spacing:.14em;text-transform:uppercase}
  .dc-chart{margin-top:14px;height:200px;border:1px dashed var(--border-strong);background:var(--surface-2);border-radius:6px;
    position:relative;overflow:hidden}
  .dc-chart .tag{position:absolute;top:8px;left:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3);letter-spacing:.05em;z-index:2}
  .dc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
  .dc-tile{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;position:relative}
  .dc-tile .k{font-size:10px;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase}
  .dc-tile .v{font-size:18px;font-weight:500;margin-top:2px;font-variant-numeric:tabular-nums}
  .dc-tile.fixed{border-left:2px solid var(--pink)}
  .dc-tile.fixed .v{color:var(--pink)}
  .dc-tile.variable .v{color:var(--blue)}
  .hero-foot{position:absolute;left:0;right:0;bottom:-60px;text-align:right;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);z-index:2;line-height:1.7}

  /* Premium card top-edge highlight */
  .card-edge{position:relative}
  .card-edge::before{content:"";position:absolute;top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);pointer-events:none}

  /* stats bar */
  .stats-bar{background:var(--surface-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;z-index:2}
  .stats-bar .grid{display:grid;grid-template-columns:repeat(4,1fr);padding:40px 32px;max-width:var(--max);margin:0 auto;gap:0}
  .stat{padding:0 28px;border-left:1px solid var(--border);position:relative}
  .stat:first-child{border-left:0;padding-left:0}
  .stat .v{font-size:36px;font-weight:400;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .stat .underline{height:1px;background:var(--border-strong);margin:14px 0 10px;width:48px}
  .stat.gradient .underline{background:var(--border-strong);width:48px;height:1px}
  .stat .k{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-3)}
  .stat .sub{font-size:12px;color:var(--text-3);margin-top:6px;font-family:'JetBrains Mono',monospace}

  /* supported protocols — row list */
  .protocols{padding:120px 0 100px;position:relative}
  .protocols .head{text-align:center;max-width:760px;margin:0 auto 48px}
  .protocols .head .title{font-size:clamp(40px,4.6vw,56px);line-height:1.04;letter-spacing:-.025em;font-weight:300;margin:0}
  .protocols .head .sub{font-size:17px;color:var(--text-2);margin-top:14px}

  .proto-list{max-width:980px;margin:0 auto;border:1px solid var(--border);border-radius:14px;background:var(--surface);overflow:hidden}
  .proto-row{display:grid;grid-template-columns:minmax(0,34%) 110px minmax(0,28%) minmax(0,28%);align-items:center;gap:24px;
    padding:22px 28px;border-top:1px solid var(--border);transition:background .2s ease,opacity .2s ease;position:relative}
  .proto-row:first-child{border-top:0}
  .proto-row.inactive{opacity:.55}
  .proto-row.active:hover{background:rgba(236,72,153,.03)}

  /* column 1: identity */
  .proto-id{display:flex;align-items:center;gap:14px;min-width:0}
  .proto-id .logo{width:36px;height:36px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
    font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;flex-shrink:0}
  .proto-row.active .proto-id .logo{background:rgba(236,72,153,.08);border-color:rgba(236,72,153,.3);color:var(--pink)}
  .proto-id .name{font-size:15px;font-weight:500;letter-spacing:-.005em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .proto-id .slabel{font-size:12px;color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-top:2px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* column 2: badge */
  .proto-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.16em;font-weight:600;
    padding:4px 10px;border-radius:999px;font-family:'JetBrains Mono',monospace;justify-self:start}
  .proto-badge.live{background:rgba(236,72,153,.1);color:var(--pink);border:1px solid rgba(236,72,153,.35)}
  .proto-badge.live::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--pink);
    box-shadow:0 0 6px rgba(236,72,153,.8);animation:pulse-live 1.8s ease-in-out infinite}
  @keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.45}}
  .proto-badge.soon{background:rgba(138,143,156,.06);color:var(--text-3);border:1px solid var(--border-strong)}

  /* column 3: APY */
  .proto-apy-col{display:flex;flex-direction:column;gap:2px;min-width:0}
  .proto-apy{font-size:28px;font-weight:300;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;color:var(--text)}
  .proto-apy.placeholder{color:var(--text-3)}
  .proto-apy-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);font-family:'JetBrains Mono',monospace;margin-top:4px}

  /* column 4: action */
  .proto-action{justify-self:end;width:100%;max-width:180px}
  .proto-cta{width:100%;height:40px;border-radius:8px;font-size:13px;font-weight:600;letter-spacing:.02em;
    display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s ease;cursor:pointer;font-family:inherit;position:relative}
  .proto-cta.primary{background:var(--pink);color:#0a0612;border:0}
  .proto-cta.primary:hover{background:#db2777;box-shadow:0 0 20px rgba(236,72,153,.35)}
  .proto-cta.disabled{background:transparent;color:var(--text-3);border:1px solid var(--border-strong);cursor:not-allowed}
  .proto-cta.disabled:hover .tooltip{opacity:1;transform:translate(-50%,-4px)}
  .proto-cta .tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translate(-50%,0);
    background:#0b0d14;border:1px solid var(--border-strong);color:var(--text-2);padding:6px 10px;border-radius:6px;
    font-size:10px;letter-spacing:.08em;white-space:nowrap;opacity:0;pointer-events:none;transition:all .2s ease;
    font-family:'JetBrains Mono',monospace;z-index:10}
  .proto-cta .tooltip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:var(--border-strong)}

  .protocols .foot{text-align:center;margin-top:32px;font-size:13px;color:var(--text-3);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
  .protocols .foot a{color:var(--pink);text-decoration:none;border-bottom:1px solid rgba(236,72,153,.3)}
  .protocols .foot a:hover{border-bottom-color:var(--pink)}

  @media (max-width:720px){
    .proto-row{grid-template-columns:1fr;gap:10px;padding:20px 20px}
    .proto-badge{justify-self:start}
    .proto-action{max-width:none;justify-self:stretch}
  }

  /* problem */
  .problem-chart{margin-top:48px;height:340px;border:1px dashed var(--border-strong);background:var(--surface-2);
    border-radius:6px;position:relative;overflow:hidden}
  .problem-chart .tag{position:absolute;top:14px;left:18px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);letter-spacing:.05em;z-index:2}
  .problem-chart .pin{position:absolute;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-2);
    background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 10px;white-space:nowrap;z-index:2}
  .problem-chart .pin.pink::before{background:var(--pink)}
  .problem-chart .pin.blue::before{background:var(--blue)}
  .problem-chart .pin::before{content:"";position:absolute;width:8px;height:8px;border-radius:50%;top:50%;transform:translateY(-50%);left:-12px}
  .problem-caption{margin-top:22px;color:var(--text-2);font-size:15px;max-width:960px}
  .problem-close{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:56px;padding-top:40px;border-top:1px solid var(--border)}
  .problem-close div{font-size:22px;font-weight:400;letter-spacing:-.01em;color:var(--text)}

  /* solution cards */
  .sol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;
    transition:border-color .25s ease,transform .25s ease,box-shadow .25s ease;position:relative}
  .card.themed-pink:hover{border-color:var(--pink);box-shadow:0 0 0 1px rgba(236,72,153,.4), inset 0 40px 80px -40px rgba(236,72,153,.12)}
  .card.themed-purple:hover{border-color:var(--pink);box-shadow:0 0 0 1px rgba(236,72,153,.4), inset 0 40px 80px -40px rgba(236,72,153,.12)}
  .card.themed-blue:hover{border-color:var(--blue);box-shadow:0 0 0 1px rgba(59,130,246,.4), inset 0 40px 80px -40px rgba(59,130,246,.14)}
  .card:hover{transform:translateY(-2px)}
  .card .icon-ph{width:48px;height:48px;border:1px dashed var(--border-strong);background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;border-radius:8px;margin-bottom:24px}
  .card h3{font-size:22px;font-weight:500;letter-spacing:-.01em;margin:0 0 10px;display:flex;align-items:center;gap:10px}
  .card h3 .tick{width:12px;height:12px;opacity:.7}
  .card p{color:var(--text-2);font-size:15px;margin:0;line-height:1.6}

  /* how it works */
  .how-wrap{position:relative;margin-top:60px}
  .how-connector{position:absolute;top:60px;left:5%;right:5%;height:0;
    border-top:1px dashed rgba(138,143,156,.3);pointer-events:none}
  .how-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative}
  .step{position:relative}
  .step .step-ph{height:120px;border:1px dashed var(--border-strong);background:var(--surface-2);border-radius:6px;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:11px;margin-bottom:20px;position:relative;z-index:1}
  .step .n{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--pink);letter-spacing:.1em;margin-bottom:10px}
  .step .t{font-size:15px;line-height:1.55;color:var(--text-2)}
  .step .t b{color:var(--text);font-weight:500}
  .callout{margin-top:60px;background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--pink);border-radius:8px;padding:28px 32px;display:flex;gap:32px;align-items:center}
  .callout .k{font-size:13px;color:var(--pink);letter-spacing:.08em;text-transform:uppercase;min-width:280px;font-weight:500}
  .callout .v{font-size:17px;color:var(--text-2);line-height:1.55}
  .callout .v b{color:var(--text);font-weight:500}

  /* product showcase */
  .show-row{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin-bottom:120px}
  .show-row:last-child{margin-bottom:0}
  .show-row.reverse .shot{order:2}
  .shot{aspect-ratio:640/440;border:1px dashed var(--border-strong);background:var(--surface-2);border-radius:8px;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:12px;flex-direction:column;gap:8px}
  .show-copy h3{font-size:36px;line-height:1.1;letter-spacing:-.02em;font-weight:300;margin:0 0 18px}
  .show-copy p{color:var(--text-2);font-size:17px;line-height:1.6;max-width:480px;margin:0}

  /* market opportunity */
  .market{text-align:center;position:relative}
  .market .anemone-bg{display:none}
  .market .inner{position:relative;z-index:1}
  .market .big{font-size:clamp(96px,13vw,160px);font-weight:200;letter-spacing:-.055em;line-height:1;margin-top:28px;font-variant-numeric:tabular-nums;display:inline-block}
  .market .cap{font-size:18px;color:var(--text-2);margin-top:20px;max-width:640px;margin-left:auto;margin-right:auto}
  .bars{margin:72px auto 0;max-width:820px;text-align:left;display:flex;flex-direction:column;gap:22px}
  .bar-row{display:grid;grid-template-columns:200px 1fr 120px;gap:20px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px}
  .bar-row .lbl{color:var(--text-2);letter-spacing:.04em}
  .bar-row .track{height:14px;background:var(--surface-2);border:1px solid var(--border);border-radius:2px;overflow:hidden}
  .bar-row .fill{height:100%}
  .bar-row .fill.grad{background:var(--blue)}
  .bar-row .fill.purple{background:rgba(138,143,156,.6)}
  .bar-row .fill.blue{background:var(--pink)}
  .bar-row .val{color:var(--text);text-align:right;font-variant-numeric:tabular-nums}
  .market .close{margin-top:60px;font-size:20px;color:var(--text);letter-spacing:-.01em;max-width:760px;margin-left:auto;margin-right:auto;font-weight:300}

  /* comparison */
  .cmp{margin-top:48px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
  .cmp table{width:100%;border-collapse:collapse}
  .cmp th,.cmp td{padding:20px 24px;text-align:left;font-size:14px;border-top:1px solid var(--border);vertical-align:top}
  .cmp thead th{background:var(--surface-2);border-top:0;font-weight:500;color:var(--text-2);font-size:11px;text-transform:uppercase;letter-spacing:.14em}
  .cmp .col-us{border-left:2px solid var(--pink);background:rgba(236,72,153,.04)}
  .cmp thead .col-us{color:var(--pink)}
  .cmp td.row-k{color:var(--text-3);text-transform:uppercase;font-size:11px;letter-spacing:.14em;font-weight:500;width:200px}
  .strike-red{text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:1.5px;color:var(--text-2)}

  /* trust strip */
  .trust-strip{display:flex;align-items:center;justify-content:space-between;gap:24px;margin-top:36px;
    padding:28px 32px;border:1px solid var(--border);border-radius:12px;background:var(--surface);flex-wrap:wrap;position:relative}
  .trust-strip .logo-slot{display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 16px;
    border:1px dashed var(--border-strong);background:var(--surface-2);color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em}
  .trust-intro{font-size:13px;color:var(--text-3);text-align:center}

  /* final cta */
  .final{text-align:center;padding:180px 0;position:relative}
  .final::before{content:"";position:absolute;top:0;left:10%;right:10%;height:1px;
    background:#1e1f2a;opacity:1}
  .final h2{font-size:clamp(48px,6.2vw,80px);line-height:1;letter-spacing:-.035em;font-weight:300;margin:0}
  .final .sub{font-size:20px;color:var(--text-2);margin:24px 0 40px}
  .final .note{font-size:13px;color:var(--text-3);margin-top:28px}

  /* footer */
  footer{border-top:1px solid var(--border);padding:80px 0 32px;background:var(--surface-2);position:relative}
  footer::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:#1e1f2a}
  .foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:48px}
  .foot-brand .wordmark{font-size:22px;font-weight:500;letter-spacing:-.015em}
  .foot-brand p{color:var(--text-3);font-size:14px;margin:14px 0 0;max-width:260px}
  .foot-col h4{font-size:11px;color:var(--text-3);letter-spacing:.18em;text-transform:uppercase;font-weight:500;margin:0 0 18px}
  .foot-col ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
  .foot-col a{font-size:14px;color:var(--text-2)}
  .foot-col a:hover{color:var(--text)}
  .foot-bot{display:flex;justify-content:space-between;align-items:center;margin-top:72px;padding-top:28px;border-top:1px solid var(--border);font-size:12px;color:var(--text-3);font-family:'JetBrains Mono',monospace;flex-wrap:wrap;gap:20px}
  .foot-social{display:flex;gap:8px}
  .foot-social .s{width:24px;height:24px;border:1px dashed var(--border-strong);background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:9px;border-radius:4px}
  .disclaimer{margin-top:20px;font-size:11px;color:var(--text-3);max-width:720px;line-height:1.6}

  /* responsive */
  @media (max-width: 900px){
    .hero-grid{grid-template-columns:1fr;gap:64px;min-height:auto}
    .sol-grid{grid-template-columns:1fr}
    .how-grid{grid-template-columns:1fr 1fr}
    .how-connector{display:none}
    .show-row{grid-template-columns:1fr;gap:32px;margin-bottom:72px}
    .show-row.reverse .shot{order:0}
    .stats-bar .grid{grid-template-columns:1fr 1fr}
    .stat{padding:16px 20px;border-top:1px solid var(--border)}
    .stat:nth-child(-n+2){border-top:0}
    .stat:nth-child(odd){border-left:0;padding-left:0}
    .foot-grid{grid-template-columns:1fr 1fr;gap:32px}
    .navlinks{display:none}
    section{padding:80px 0}
    .callout{flex-direction:column;align-items:flex-start;gap:12px}
    .problem-close{grid-template-columns:1fr}
    .bar-row{grid-template-columns:120px 1fr 80px;gap:12px;font-size:11px}
  }

  /* reveal — visible by default, animate when entering viewport */
  .reveal{opacity:.001;transform:translateY(10px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  @keyframes revealFallback { to { opacity:1; transform:none } }
  .reveal{animation:revealFallback 0s ease 1.8s forwards}
</style>

<!-- build the anemone bg rays -->
<script>
(function(){
  // Create radial rays for the anemone background motif
  function buildRays(){
    const g = document.getElementById("rays-inject");
    if(!g) return;
    const count = 64;
    let out = "";
    for(let i=0;i<count;i++){
      const a = (i/count)*Math.PI*2;
      const r1 = 70 + (i%4)*18;
      const r2 = 280 + (i%3)*60;
      const x1 = Math.cos(a)*r1, y1 = Math.sin(a)*r1;
      const x2 = Math.cos(a)*r2, y2 = Math.sin(a)*r2;
      out += `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" opacity="${0.5 + (i%3)*0.15}"/>`;
    }
    g.innerHTML = out;
  }
  window.__buildAnemoneRays = buildRays;
})();
</script>
