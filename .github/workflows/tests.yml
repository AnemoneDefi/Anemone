name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  SOLANA_VERSION: "v3.1.5"
  ANCHOR_VERSION: "0.32.1"
  SBF_TOOLS_VERSION: "v1.52"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Rust toolchain is read from rust-toolchain.toml (1.89.0)
      - name: Setup Rust toolchain
        run: rustup show

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache program build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'programs/**/*.rs') }}
          restore-keys: cargo-target-${{ runner.os }}-

      - name: Install Solana CLI (Agave ${{ env.SOLANA_VERSION }})
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache SBF platform-tools ${{ env.SBF_TOOLS_VERSION }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana/${{ env.SBF_TOOLS_VERSION }}
            ~/.rustup/toolchains/1.89.0-sbpf-solana-${{ env.SBF_TOOLS_VERSION }}
          key: sbf-tools-${{ env.SBF_TOOLS_VERSION }}

      - name: Install SBF platform-tools ${{ env.SBF_TOOLS_VERSION }}
        run: cargo-build-sbf --tools-version ${{ env.SBF_TOOLS_VERSION }} --install-only

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev

      - name: Cache Anchor CLI ${{ env.ANCHOR_VERSION }}
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI ${{ env.ANCHOR_VERSION }}
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: cargo install anchor-cli --version ${{ env.ANCHOR_VERSION }} --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Solana keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
          solana config set --url localhost

      - name: Patch USDC mint authority to CI wallet
        run: yarn ts-node tests/scripts/patch_usdc_mint.ts

      - name: Build program (cargo-build-sbf)
        run: cargo-build-sbf --tools-version ${{ env.SBF_TOOLS_VERSION }}

      - name: Generate IDL
        run: |
          mkdir -p target/idl
          anchor idl build -o target/idl/anemone.json

      - name: Run tests
        run: anchor test --skip-build

      # Fase 5 Parte 3 — CI extensions
      #
      # Anchor tests above validate devnet flow against localnet (stub-oracle).
      # The checks below guard things Anchor's harness doesn't touch: unit
      # tests (including the Kamino Reserve layout pin from H2), mainnet
      # build shape, a dependency-vulnerability scan, and a lint pass.
      #
      # Clippy and cargo-audit are `continue-on-error: true` on purpose —
      # they gate on transitive crate advisories and lint noise we don't
      # want blocking security merges. Flip to false once the baselines are
      # clean.

      - name: Unit tests + Kamino layout pin
        run: cargo test -p anemone --tests

      - name: Mainnet build check (no stub-oracle)
        run: |
          yarn build:mainnet
          if grep -q 'setRateIndexOracle' target/idl/anemone.json; then
            echo "::error::setRateIndexOracle leaked into the mainnet IDL — stub-oracle feature guard failed"
            exit 1
          fi
          echo "Mainnet IDL is free of setRateIndexOracle ✓"

      - name: Cargo clippy
        continue-on-error: true
        run: cargo clippy -p anemone -- -D warnings

      - name: Cargo audit
        continue-on-error: true
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
