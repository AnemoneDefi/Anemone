[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
anemone = "KQs6ci5FtedFKPVJThAZSMMXyosK4TvnF7kcDSx5Jwd"

[programs.devnet]
anemone = "KQs6ci5FtedFKPVJThAZSMMXyosK4TvnF7kcDSx5Jwd"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test.validator]
bind_address = "127.0.0.1"
startup_wait = 30000

# Kamino program (dumped from mainnet)
[[test.validator.programs]]
address = "KLend2g3cP87fffoy8q1mQqGKjrxjC8boSyAYavgmjD"
filename = "tests/fixtures/kamino_program.so"

# Kamino USDC Reserve
